<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami - Md. Zannat Nayem Talukder</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #d4af37; --navy: #001f3f; }
        body {
            background: #000a14; color: white; font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh;
            overflow-x: hidden;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000a14; z-index: 100; display: flex;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .dev-badge { color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; }
        
        .wheel-container { position: relative; margin: 25px 0; }
        #wheel { 
            border: 6px solid var(--gold); border-radius: 50%; 
            background: #111; transform: rotate(0deg);
        }
        /* CSS Animation for the "Fear" stop */
        .spinning {
            animation: spinStop 9s cubic-bezier(0.15, 0, 0.15, 1) forwards;
        }
        @keyframes spinStop {
            from { transform: rotate(0deg); }
            to { transform: rotate(var(--end-deg)); }
        }

        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid #ff4757; z-index: 10; }

        input { padding: 12px; width: 80%; margin-bottom: 10px; border-radius: 8px; border: 2px solid var(--gold); background: #001f3f; color: white; text-align: center; font-size: 16px; }
        .btn { padding: 15px 40px; background: var(--gold); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; color: #001224; font-size: 1.1rem; }
        
        #voucher { display: none; background: white; color: #333; padding: 25px; border-radius: 12px; border-top: 10px solid var(--gold); margin-top: 20px; width: 90%; max-width: 400px; text-align: left; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="dev-badge">Developed by Md. Zannat Nayem Talukder, BUTEX</div>
        <h2 style="color:var(--gold)">🌙 Eid Salami Pro</h2>
        <p>Bhai/Apu kach theke Salami aday korun!</p>
        <button class="btn" onclick="unlock()">ENTER APP</button>
    </div>

    <div class="dev-badge">Md. Zannat Nayem Talukder, BUTEX</div>
    <h1>🌙 Eid Salami</h1>

    <div id="ui-area">
        <input type="text" id="senior" placeholder="Senior's Name">
        <input type="text" id="junior" placeholder="Junior's Name">
        <br>
        <button id="spinBtn" class="btn">SPIN WHEEL</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>

    <div id="voucher">
        <div style="font-size: 0.7rem; color: #777; margin-bottom:5px;">OFFICIAL ISSUER: MD. ZANNAT NAYEM TALUKDER</div>
        <h3 style="color:var(--gold); border-bottom:1px solid #eee; padding-bottom:10px; margin:0 0 15px 0;">SALAMI VOUCHER</h3>
        <div id="v-body"></div>
    </div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    let isUnlocked = false;

    const items = [
        { label: "0 TK (Sorry!)", w: 35, c: "#1a1a1a" },
        { label: "0.1 TK", w: 25, c: "#1a2a6c" },
        { label: "1 TK", w: 25, c: "#b21f1f" },
        { label: "20TK", w: 25, c: "#fdbb2d" },
        { label: "3 TK", w: 25, c: "#22c1c3" },
        { label: "5 TK", w: 20, c: "#e67e22" },
        { label: "10 TK", w: 15, c: "#2ecc71" },
        { label: "2TK", w: 10, c: "#8e44ad" },
        { label: "0.50 TK", w: 6, c: "#D4AF37" }
    ];
    const totalW = items.reduce((s, i) => s + i.w, 0);

    function unlock() {
        isUnlocked = true;
        document.getElementById('overlay').style.display = 'none';
        // Force audio engine to wake up
        const a = new (window.AudioContext || window.webkitAudioContext)();
        a.resume();
        window.speechSynthesis.getVoices();
    }

    function draw() {
        let currentAngle = 0;
        ctx.clearRect(0,0,350,350);
        items.forEach(item => {
            const angle = (item.w / totalW) * 2 * Math.PI;
            ctx.beginPath(); ctx.moveTo(175, 175);
            ctx.arc(175, 175, 170, currentAngle, currentAngle + angle);
            ctx.fillStyle = item.c; ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
            ctx.save(); ctx.translate(175, 175); ctx.rotate(currentAngle + angle/2);
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial";
            ctx.fillText(item.label, 60, 5); ctx.restore();
            currentAngle += angle;
        });
    }

    spinBtn.onclick = () => {
        const s = document.getElementById('senior').value.trim();
        const j = document.getElementById('junior').value.trim();
        if(!s || !j) return alert("Bhai, naam likho agey!");

        const id = `salami_${s.toLowerCase()}_${j.toLowerCase()}`;
        if(localStorage.getItem(id)) {
            showVoucher(JSON.parse(localStorage.getItem(id)));
            return;
        }

        // Voice Fallback
        try {
            const voice = new SpeechSynthesisUtterance("salami lagbe salamiiiiiii. Hui hui huiiiiii");
            voice.lang = 'bn-BD'; voice.pitch = 1.3;
            window.speechSynthesis.speak(voice);
        } catch(e) { console.log("Voice blocked"); }

        spinBtn.disabled = true;
        
        // Calculate result BEFORE animation starts
        const totalSpinDeg = Math.floor(Math.random() * 360) + 2880; 
        canvas.style.setProperty('--end-deg', `${totalSpinDeg}deg`);
        canvas.classList.add('spinning');

        setTimeout(() => {
            const deg = (360 - (totalSpinDeg % 360) + 270) % 360;
            let cur = 0;
            for(let item of items) {
                const itemDeg = (item.w / totalW) * 360;
                if(deg >= cur && deg < cur + itemDeg) {
                    const res = { j, s, a: item.label, d: new Date().toLocaleString() };
                    localStorage.setItem(id, JSON.stringify(res));
                    showVoucher(res);
                    if(item.label !== "0 TK (Sorry!)") confetti({ particleCount: 150 });
                    break;
                }
                cur += itemDeg;
            }
            spinBtn.disabled = false;
        }, 9000);
    };

    function showVoucher(data) {
        document.getElementById('ui-area').style.display = 'none';
        document.getElementById('voucher').style.display = 'block';
        document.getElementById('v-body').innerHTML = `
            <strong>To Junior:</strong> ${data.j}<br>
            <strong>From Senior:</strong> ${data.s}<br>
            <div style="color:#b21f1f; font-size:1.8rem; font-weight:bold; margin:10px 0;">${data.a}</div>
            <small>Date: ${data.d}</small>
        `;
    }
    draw();
</script>
</body>
</html>
