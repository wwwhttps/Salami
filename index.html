<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami - Md. Zannat Nayem Talukder</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #d4af37; --navy: #001f3f; --crimson: #b21f1f; }
        body {
            background: #000a14; color: white; font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            margin: 0; min-height: 100vh;
        }
        .dev-badge { 
            color: var(--gold); font-weight: bold; border: 1px solid var(--gold); 
            padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; 
            margin-bottom: 15px; background: rgba(212, 175, 55, 0.1);
        }
        h1 { margin: 0; color: var(--gold); letter-spacing: 1px; }

        .wheel-container { position: relative; margin: 25px 0; }
        #wheel { 
            border: 6px solid var(--gold); border-radius: 50%; 
            /* Agonizingly slow stop for "fear" factor */
            transition: transform 9s cubic-bezier(0.15, 0, 0.15, 1);
            background: #111; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; 
            border-right: 18px solid transparent; border-top: 35px solid #ff4757; 
            z-index: 10; filter: drop-shadow(0 2px 5px black);
        }

        input { 
            padding: 12px; width: 85%; max-width: 300px; margin-bottom: 12px; 
            border-radius: 8px; border: 2px solid var(--gold); background: #001f3f; 
            color: white; text-align: center; font-size: 1rem; outline: none;
        }
        button { 
            padding: 15px 45px; background: var(--gold); border: none; 
            border-radius: 30px; font-weight: bold; cursor: pointer; 
            font-size: 1.2rem; color: #001224; transition: 0.2s;
        }
        button:disabled { background: #444; color: #888; }

        #voucher { 
            display: none; background: white; color: #333; padding: 30px; 
            border-radius: 12px; border-top: 10px solid var(--gold); 
            margin-top: 25px; width: 90%; max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: left;
        }
        .voucher-title { 
            color: var(--gold); font-weight: 800; border-bottom: 1px solid #eee; 
            padding-bottom: 10px; margin-bottom: 15px; text-align: center; font-size: 1.2rem;
        }
        .issuer-tag { font-size: 0.75rem; color: #777; margin-bottom: 5px; text-transform: uppercase; }

        .footer { margin-top: auto; padding: 20px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="dev-badge">Developed by Md. Zannat Nayem Talukder, BUTEX</div>
    <h1>🌙 Eid Salami</h1>

    <div id="ui-area">
        <input type="text" id="senior" placeholder="Senior's Name">
        <input type="text" id="junior" placeholder="Junior's Name">
        <br>
        <button id="spinBtn">SPIN FOR SALAMI</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="360" height="360"></canvas>
    </div>

    <div id="voucher">
        <div class="issuer-tag">Official Issuer</div>
        <div style="font-weight: bold; margin-bottom: 15px;">Md. Zannat Nayem Talukder</div>
        <div class="voucher-title">SALAMI VOUCHER</div>
        <div id="v-body" style="font-size: 1.1rem; line-height: 1.6;"></div>
        <p style="font-size: 0.75rem; color: #888; margin-top: 20px; font-style: italic; text-align: center;">
            *Screenshot and share with your senior!*
        </p>
    </div>

    <div class="footer">Department of DCE, BUTEX</div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');

    const items = [
        { label: "0 TK (Sorry!)", w: 35, c: "#1a1a1a" },
        { label: "0.1 TK", w: 25, c: "#1a2a6c" },
        { label: "1 TK", w: 25, c: "#b21f1f" },
        { label: "2 TK", w: 25, c: "#fdbb2d" },
        { label: "30 TK", w: 25, c: "#22c1c3" },
        { label: "4 TK", w: 25, c: "#9a00d4" },
        { label: "5 TK", w: 20, c: "#e67e22" },
        { label: "10 TK", w: 15, c: "#2ecc71" },
        { label: "20 TK", w: 10, c: "#8e44ad" },
        { label: "50 TK", w: 6, c: "#D4AF37" }
    ];

    const totalW = items.reduce((s, i) => s + i.w, 0);
    let rotation = 0;

    function draw() {
        let currentAngle = 0;
        ctx.clearRect(0,0,360,360);
        items.forEach(item => {
            const angle = (item.w / totalW) * 2 * Math.PI;
            ctx.beginPath(); ctx.moveTo(180, 180);
            ctx.arc(180, 180, 175, currentAngle, currentAngle + angle);
            ctx.fillStyle = item.c; ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1; ctx.stroke();

            ctx.save(); ctx.translate(180, 180); ctx.rotate(currentAngle + angle/2);
            ctx.fillStyle = "white"; ctx.font = "bold 13px Arial";
            ctx.fillText(item.label, 70, 5); ctx.restore();
            currentAngle += angle;
        });
    }

    function playSpinSound() {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator(); const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.value = 600; g.gain.value = 0.05;
        o.start(); o.stop(a.currentTime + 0.05);
    }

    spinBtn.onclick = () => {
        const s = document.getElementById('senior').value.trim();
        const j = document.getElementById('junior').value.trim();
        if(!s || !j) return alert("Please enter both names!");

        const id = `salami_${s.toLowerCase()}_${j.toLowerCase()}`;
        if(localStorage.getItem(id)) {
            alert("Already spun for this Senior! Loading previous result.");
            showVoucher(JSON.parse(localStorage.getItem(id)));
            return;
        }

        const speech = new SpeechSynthesisUtterance("salami lagbe salamiiiiiii. Hui hui huiiiiii");
        speech.lang = 'bn-BD'; speech.pitch = 1.3; speech.rate = 0.9;
        window.speechSynthesis.speak(speech);

        spinBtn.disabled = true;
        const spinAmount = Math.floor(Math.random() * 360) + 2880; // 8+ full rotations
        rotation += spinAmount;
        canvas.style.transform = `rotate(${rotation}deg)`;

        let count = 0; 
        const ticker = setInterval(() => { if(count++ < 60) playSpinSound(); else clearInterval(ticker); }, 140);

        setTimeout(() => {
            const deg = (360 - (rotation % 360) + 270) % 360;
            let cur = 0;
            for(let item of items) {
                const itemDeg = (item.w / totalW) * 360;
                if(deg >= cur && deg < cur + itemDeg) {
                    const res = { j, s, a: item.label, d: new Date().toLocaleString() };
                    localStorage.setItem(id, JSON.stringify(res));
                    showVoucher(res);
                    if(item.label !== "0 TK (Sorry!)") confetti({ particleCount: 150 });
                    break;
                }
                cur += itemDeg;
            }
            spinBtn.disabled = false;
        }, 9100); // Wait for the new 9s transition to finish
    };

    function showVoucher(data) {
        document.getElementById('ui-area').style.display = 'none';
        document.getElementById('voucher').style.display = 'block';
        document.getElementById('v-body').innerHTML = `
            <strong>Junior:</strong> ${data.j}<br>
            <strong>Senior:</strong> ${data.s}<br>
            <strong>Salami:</strong> <span style="font-size:1.8rem; color:#b21f1f; font-weight:bold;">${data.a}</span><br>
            <small>Date: ${data.d}</small>
        `;
    }

    draw();
</script>
</body>
</html>
